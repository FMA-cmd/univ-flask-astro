{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Galerie de Photographies</h2>
<div class="row">
    {% for photo in photos %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm">
            <img src="{{ url_for('static', filename=photo.url) }}" class="card-img-top" alt="{{ photo.title }}" style="height: 200px; object-fit: cover;">
            <div class="card-body">
                <h5 class="card-title">{{ photo.title }}</h5>
                <p class="card-text text-muted">{{ photo.description }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
